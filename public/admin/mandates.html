<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SureSystems Mandates | Your Company</title>
    <link rel="stylesheet" href="../shared/theme.css" />
    <link rel="stylesheet" href="./src/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gray-100 antialiased">
    
    <div id="app-shell" class="min-h-screen">
      <!-- Loading spinner while layout.js initializes-->
      <div class="flex items-center justify-center h-screen">
        <i class="fa-solid fa-circle-notch fa-spin text-3xl" style="color: var(--color-secondary);"></i>
      </div>
    </div>

    <!-- Payload Modal -->
    <div id="payload-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl p-8 m-4 max-h-[90vh] flex flex-col transform transition-transform duration-300 scale-95">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-2xl font-bold text-gray-800">Mandate Details</h2>
                <button id="close-modal-btn" class="text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-times fa-xl"></i>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto pr-2 space-y-6">
                <!-- Status Banner -->
                <div id="modal-status-banner" class="p-4 rounded-xl font-semibold flex items-center gap-3">
                    <i id="modal-status-icon" class="fa-solid fa-info-circle text-xl"></i>
                    <div>
                        <div id="modal-status-text" class="text-lg">Status: Unknown</div>
                        <div id="modal-message-text" class="text-sm font-normal opacity-90 mt-1"></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Request Payload -->
                    <div>
                        <h3 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2">Request Payload</h3>
                        <div class="bg-gray-900 rounded-xl p-4 overflow-x-auto h-64">
                            <pre id="modal-request-payload" class="text-xs text-green-400 font-mono"></pre>
                        </div>
                    </div>
                    
                    <!-- Response/Error Payload -->
                    <div>
                        <h3 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2">API Response</h3>
                        <div class="bg-gray-900 rounded-xl p-4 overflow-x-auto h-64">
                            <pre id="modal-response-payload" class="text-xs text-blue-400 font-mono"></pre>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-6 pt-4 border-t border-gray-100 flex justify-end gap-3">
                <button id="btn-check-fate" class="px-5 py-2 bg-blue-50 text-blue-700 font-bold rounded-lg border border-blue-200 hover:bg-blue-100 transition-colors hidden">
                    <i class="fa-solid fa-rotate mr-2"></i> Check Final Fate
                </button>
                <button id="btn-retry-mandate" class="px-5 py-2 bg-orange-600 text-white font-bold rounded-lg hover:bg-orange-700 transition-colors hidden">
                    <i class="fa-solid fa-rotate-right mr-2"></i> Retry Mandate
                </button>
            </div>
        </div>
    </div>

    <!-- Main JS file for this page -->
    <script type="module" src="/src/modules/mandates.js"></script>
</body>
</html>
