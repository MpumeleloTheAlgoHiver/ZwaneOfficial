<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debit Mandates | Zwane Financial</title>
    <link rel="stylesheet" href="../shared/theme.css" />
    <link rel="stylesheet" href="./src/styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 antialiased">

    <!-- Loading splash -->
    <div id="app-shell" class="min-h-screen flex items-center justify-center">
      <div class="text-center">
        <i class="fa-solid fa-circle-notch fa-spin text-3xl text-orange-500 mb-4"></i>
        <p class="text-gray-500 font-semibold">Loading mandates...</p>
      </div>
    </div>

    <!-- Mandate detail modal -->
    <div id="payload-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
      <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg max-h-[90vh] flex flex-col transform transition-all duration-200 scale-95">

        <!-- Fixed header -->
        <div class="flex items-center justify-between p-6 border-b border-gray-100 flex-shrink-0">
          <h2 class="text-xl font-bold text-gray-900">Mandate Details</h2>
          <button id="close-modal-btn" class="w-9 h-9 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition-colors">
            <i class="fa-solid fa-times text-gray-500"></i>
          </button>
        </div>

        <!-- Scrollable body -->
        <div class="overflow-y-auto flex-1">
          <div class="p-6 space-y-4">
            <!-- Status banner -->
            <div id="modal-status-banner" class="p-4 rounded-2xl flex items-start gap-3 border">
              <i id="modal-status-icon" class="fa-solid fa-info-circle text-xl mt-0.5"></i>
              <div>
                <div id="modal-status-text" class="font-bold text-base"></div>
                <div id="modal-message-text" class="text-sm mt-0.5 opacity-80"></div>
              </div>
            </div>

            <!-- Details grid -->
            <div id="modal-details-grid" class="grid grid-cols-2 gap-3 text-sm"></div>
          </div>

          <!-- Primary actions -->
          <div class="px-6 pb-4 flex flex-wrap gap-2">
            <button id="btn-check-fate" class="flex-1 px-4 py-2.5 bg-indigo-50 text-indigo-700 font-bold rounded-xl border border-indigo-200 hover:bg-indigo-100 transition-colors hidden">
              <i class="fa-solid fa-circle-check mr-2"></i>Check outcome
            </button>
            <button id="btn-run-enquiry" class="flex-1 px-4 py-2.5 bg-sky-50 text-sky-700 font-bold rounded-xl border border-sky-200 hover:bg-sky-100 transition-colors hidden">
              <i class="fa-solid fa-magnifying-glass mr-2"></i>Check status
            </button>
            <button id="btn-retry-mandate" class="flex-1 px-4 py-2.5 bg-orange-600 text-white font-bold rounded-xl hover:bg-orange-700 transition-colors hidden">
              <i class="fa-solid fa-rotate-right mr-2"></i>Try again
            </button>
            <button id="btn-run-cancel" class="flex-1 px-4 py-2.5 bg-red-50 text-red-700 font-bold rounded-xl border border-red-200 hover:bg-red-100 transition-colors hidden">
              <i class="fa-solid fa-ban mr-2"></i>Cancel debit
            </button>
            <a id="btn-open-application" href="#" class="flex-1 px-4 py-2.5 bg-gray-900 text-white font-bold rounded-xl hover:bg-black transition-colors text-center pointer-events-none opacity-40">
              <i class="fa-solid fa-arrow-up-right-from-square mr-2"></i>Open application
            </a>
          </div>

          <!-- Payment schedule section (shown when mandate has a contract reference) -->
          <div id="modal-installments-section" class="hidden border-t border-gray-100 px-6 py-5">
            <h3 class="text-sm font-bold text-gray-700 mb-3">
              <i class="fa-solid fa-calendar-days text-orange-500 mr-1.5"></i>Payment Schedule
            </h3>
            <div class="flex flex-wrap gap-2 mb-4">
              <button id="btn-view-schedule" class="px-3 py-2 bg-orange-50 text-orange-700 text-xs font-bold rounded-xl border border-orange-200 hover:bg-orange-100 transition-colors">
                <i class="fa-solid fa-list-ul mr-1.5"></i>View schedule
              </button>
              <button id="btn-show-change-date" class="px-3 py-2 bg-gray-50 text-gray-700 text-xs font-bold rounded-xl border border-gray-200 hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-calendar-pen mr-1.5"></i>Change payment date
              </button>
              <button id="btn-show-cancel-payment" class="px-3 py-2 bg-red-50 text-red-700 text-xs font-bold rounded-xl border border-red-200 hover:bg-red-100 transition-colors">
                <i class="fa-solid fa-xmark mr-1.5"></i>Cancel a payment
              </button>
              <button id="btn-view-datelist" class="px-3 py-2 bg-gray-50 text-gray-700 text-xs font-bold rounded-xl border border-gray-200 hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-calendar-days mr-1.5"></i>Date list
              </button>
            </div>

            <!-- Change date form -->
            <div id="change-date-form" class="hidden bg-blue-50 border border-blue-200 rounded-2xl p-4 mb-3 space-y-3">
              <p class="text-xs font-bold text-blue-800">Change a scheduled payment date</p>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="text-[10px] font-bold uppercase tracking-wider text-gray-500 block mb-1">Payment #</label>
                  <input type="number" id="update-installment-no" min="1" placeholder="e.g. 2"
                    class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm bg-white focus:ring-2 focus:ring-orange-500 outline-none">
                </div>
                <div>
                  <label class="text-[10px] font-bold uppercase tracking-wider text-gray-500 block mb-1">New date</label>
                  <input type="date" id="update-installment-date"
                    class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm bg-white focus:ring-2 focus:ring-orange-500 outline-none">
                </div>
              </div>
              <button id="btn-confirm-date-change" class="w-full px-4 py-2.5 bg-blue-600 text-white text-sm font-bold rounded-xl hover:bg-blue-700 transition-colors">
                <i class="fa-solid fa-check mr-2"></i>Update date
              </button>
            </div>

            <!-- Cancel payment form -->
            <div id="cancel-payment-form" class="hidden bg-red-50 border border-red-200 rounded-2xl p-4 mb-3 space-y-3">
              <p class="text-xs font-bold text-red-800">Cancel one scheduled payment (not the whole mandate)</p>
              <div>
                <label class="text-[10px] font-bold uppercase tracking-wider text-gray-500 block mb-1">Payment # to cancel</label>
                <input type="number" id="cancel-installment-no" min="1" placeholder="e.g. 3"
                  class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm bg-white focus:ring-2 focus:ring-orange-500 outline-none">
              </div>
              <button id="btn-confirm-cancel-payment" class="w-full px-4 py-2.5 bg-red-600 text-white text-sm font-bold rounded-xl hover:bg-red-700 transition-colors">
                <i class="fa-solid fa-ban mr-2"></i>Cancel this payment
              </button>
            </div>

            <!-- Schedule results -->
            <div id="schedule-results" class="hidden"></div>
          </div>

          <!-- TT3 Paper Mandate signature section -->
          <div id="modal-tt3-section" class="hidden border-t border-gray-100 px-6 py-5">
            <h3 class="text-sm font-bold text-gray-700 mb-1">
              <i class="fa-solid fa-pen-nib text-purple-500 mr-1.5"></i>TT3 Paper Mandate Signature
            </h3>
            <p class="text-xs text-gray-500 mb-4">Upload or draw the client's signed mandate form to authorise this paper debit order.</p>

            <!-- Canvas signature pad -->
            <div class="mb-3">
              <label class="text-[10px] font-bold uppercase tracking-wider text-gray-500 block mb-2">Draw signature</label>
              <canvas id="tt3-signature-canvas" width="440" height="160"
                class="w-full border-2 border-dashed border-gray-300 rounded-xl bg-white cursor-crosshair touch-none block">
              </canvas>
              <div class="flex items-center gap-2 mt-2">
                <button id="btn-clear-tt3-sig" class="text-xs px-3 py-1.5 bg-gray-100 text-gray-600 rounded-lg font-semibold hover:bg-gray-200 transition-colors">
                  <i class="fa-solid fa-eraser mr-1"></i>Clear
                </button>
                <span class="text-xs text-gray-400">or</span>
                <label class="text-xs px-3 py-1.5 bg-gray-100 text-gray-600 rounded-lg font-semibold hover:bg-gray-200 transition-colors cursor-pointer">
                  <i class="fa-solid fa-upload mr-1"></i>Upload image / PDF
                  <input type="file" id="tt3-signature-file" accept="image/*,application/pdf" class="hidden">
                </label>
                <span id="tt3-file-name" class="text-xs text-gray-400 truncate max-w-[120px]"></span>
              </div>
            </div>

            <button id="btn-submit-tt3-signature" class="w-full px-4 py-2.5 bg-purple-600 text-white text-sm font-bold rounded-xl hover:bg-purple-700 transition-colors">
              <i class="fa-solid fa-paper-plane mr-2"></i>Submit TT3 signature
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./src/modules/mandates.js"></script>
</body>
</html>
