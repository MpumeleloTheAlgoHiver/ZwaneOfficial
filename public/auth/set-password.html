<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Your Password — Zwane Financial Services</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">

  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="flex justify-center mb-8">
      <img src="/assets/zwane-logo.png" alt="Zwane Financial Services"
           class="h-14 object-contain"
           onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block'">
      <div id="logo-text" style="display:none" class="text-xl font-black text-gray-900">
        Zwane <span style="color:#E7762E">Financial</span>
      </div>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

      <!-- Loading state -->
      <div id="state-loading" class="text-center py-4">
        <div class="w-10 h-10 border-4 border-orange-200 border-t-orange-500 rounded-full animate-spin mx-auto mb-4"></div>
        <p class="text-sm text-gray-500">Verifying your invite link…</p>
      </div>

      <!-- Set password form -->
      <div id="state-form" class="hidden">
        <h1 class="text-xl font-black text-gray-900 mb-1">Welcome to Zwane</h1>
        <p class="text-sm text-gray-500 mb-6">Set a password to secure your account.</p>

        <div id="form-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700"></div>

        <form id="password-form" class="space-y-4">
          <div>
            <label class="block text-xs font-bold text-gray-600 uppercase tracking-wide mb-1">New Password</label>
            <input id="input-password" type="password" required minlength="8" placeholder="Min 8 characters"
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent" />
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-600 uppercase tracking-wide mb-1">Confirm Password</label>
            <input id="input-confirm" type="password" required minlength="8" placeholder="Repeat password"
              class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent" />
          </div>
          <button type="submit" id="btn-submit"
            class="w-full py-3 text-white font-bold rounded-xl text-sm mt-2 flex items-center justify-center gap-2"
            style="background:#E7762E">
            Set Password & Continue
          </button>
        </form>
      </div>

      <!-- Success -->
      <div id="state-success" class="hidden text-center py-4">
        <div class="w-14 h-14 rounded-full bg-green-50 flex items-center justify-center mx-auto mb-4">
          <svg class="w-7 h-7 text-green-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <h2 class="text-lg font-black text-gray-900 mb-1">Password set!</h2>
        <p class="text-sm text-gray-500">Redirecting you to the dashboard…</p>
      </div>

      <!-- Error (bad/expired link) -->
      <div id="state-error" class="hidden text-center py-4">
        <div class="w-14 h-14 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-4">
          <svg class="w-7 h-7 text-red-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </div>
        <h2 class="text-lg font-black text-gray-900 mb-1">Link expired or invalid</h2>
        <p class="text-sm text-gray-500 mb-4">Ask your administrator to resend the invite.</p>
        <a href="/auth/login.html" class="text-sm font-bold text-orange-600 hover:underline">Go to Login</a>
      </div>

    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/+esm';

    const supabase = createClient(
      "https://jmnjkxfxenrudpvjprcu.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptbmpreGZ4ZW5ydWRwdmpwcmN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUxODkzNzUsImV4cCI6MjA4MDc2NTM3NX0.X4ZdxzHF0b9GnHklObpIHqnhWvtKjdZnLoah0EVTvHs",
      { auth: { storage: window.localStorage, autoRefreshToken: true, persistSession: true, detectSessionInUrl: true } }
    );

    function show(id) {
      ['state-loading','state-form','state-success','state-error'].forEach(s => {
        document.getElementById(s).classList.toggle('hidden', s !== id);
      });
    }

    // Wait for Supabase to process the invite token from the URL hash
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        show('state-form');
      } else if (event === 'PASSWORD_RECOVERY') {
        show('state-form');
      }
    });

    // Also check existing session (in case onAuthStateChange already fired)
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      show('state-form');
    } else {
      // Give Supabase 3s to process the URL hash token, then show error
      setTimeout(() => {
        const cur = document.getElementById('state-loading');
        if (!cur.classList.contains('hidden')) show('state-error');
      }, 3000);
    }

    document.getElementById('password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl  = document.getElementById('form-error');
      const btn    = document.getElementById('btn-submit');
      const pw     = document.getElementById('input-password').value;
      const confirm = document.getElementById('input-confirm').value;

      errEl.classList.add('hidden');

      if (pw.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters.';
        errEl.classList.remove('hidden');
        return;
      }
      if (pw !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.classList.remove('hidden');
        return;
      }

      btn.textContent = 'Saving…'; btn.disabled = true;

      const { error } = await supabase.auth.updateUser({ password: pw });
      if (error) {
        errEl.textContent = error.message;
        errEl.classList.remove('hidden');
        btn.textContent = 'Set Password & Continue'; btn.disabled = false;
        return;
      }

      show('state-success');
      setTimeout(() => { window.location.replace('/admin/dashboard'); }, 1500);
    });
  </script>
</body>
</html>
